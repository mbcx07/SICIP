<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Proyectos | Departamento de Personal - IMSS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    /* ====== Estilos base ====== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: #f1f5f4;
      color: #0b2e13;
      line-height: 1.55;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ====== Colores Institucionales IMSS ====== */
    :root {
      --imss-green: #00573F;
      --imss-green-dark: #003f2d;
      --imss-green-light: #1b7a5c;
    }

    /* ====== Encabezado ====== */
    header {
      background: var(--imss-green);
      color: white;
      padding: 1.8rem 1rem;
      border-bottom: 6px solid var(--imss-green-light);
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }

    .header-inner {
      max-width: 1100px;
      margin: auto;
    }

    .title {
      font-size: clamp(1.8rem, 3vw, 2.3rem);
      font-weight: 700;
    }

    .subtitle {
      font-size: 1rem;
      opacity: 0.9;
      margin-top: .25rem;
    }

    /* ====== Contenido ====== */
    main {
      padding: 2rem 1rem;
    }

    .content {
      max-width: 1100px;
      margin: auto;
    }

    /* ====== Barra de búsqueda ====== */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.7rem;
      align-items: center;
    }

    .toolbar-label {
      font-weight: 600;
      color: #0b2e13;
      font-size: 0.95rem;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      border: 1px solid #bcd0c7;
      font-size: 0.95rem;
      outline: none;
      transition: all .2s ease;
      background: white;
    }

    .search-input:focus {
      border-color: var(--imss-green-light);
      box-shadow: 0 0 0 2px rgba(0, 87, 63, 0.25);
    }

    /* ====== Grid de proyectos ====== */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.3rem;
    }

    .project-card {
      background: white;
      border-radius: 10px;
      padding: 1.2rem;
      border: 1px solid #d7e4df;
      box-shadow: 0 3px 8px rgba(0,0,0,0.06);
      transition: all .18s ease-in-out;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 190px;
    }

    .project-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      border-color: #bcd0c7;
    }

    .project-tag {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 700;
      color: var(--imss-green);
    }

    .project-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin: .2rem 0;
      color: #0b2e13;
    }

    .project-subtitle {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1b7a5c;
      margin-bottom: .2rem;
    }

    .project-description {
      font-size: 0.9rem;
      color: #2d4b3a;
      margin-bottom: .8rem;
    }

    /* ====== Footer dentro de tarjeta ====== */
    .project-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .project-url {
      font-size: 0.75rem;
      color: #50695d;
      word-break: break-all;
      flex: 1;
    }

    /* ====== Botón IMSS ====== */
    .btn-link {
      background: var(--imss-green);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 0.45rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s ease;
      white-space: nowrap;
      margin-left: .7rem;
    }

    .btn-link:hover {
      background: var(--imss-green-dark);
    }

    .btn-link-icon {
      font-size: 1rem;
    }

    /* ====== Pie de página ====== */
    footer {
      background: white;
      border-top: 4px solid var(--imss-green);
      padding: 1rem;
      margin-top: 2rem;
      font-size: .85rem;
      color: #2d4b3a;
    }

    .footer-inner {
      max-width: 1100px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .5rem;
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <h1 class="title">Proyectos del Departamento de Personal</h1>
      <p class="subtitle">Instituto Mexicano del Seguro Social (IMSS)</p>
    </div>
  </header>

  <main>
    <div class="content">
      <!-- Barra con búsqueda -->
      <div class="toolbar">
        <span class="toolbar-label">Buscar proyecto:</span>
        <input
          id="searchInput"
          type="text"
          class="search-input"
          placeholder="Escribe el nombre o palabra clave..."
        />
      </div>

      <!-- Grid de proyectos -->
      <section class="projects-grid" id="projectsGrid"></section>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <span>Departamento de Personal – IMSS</span>
      <span>Acceso institucional a proyectos internos</span>
    </div>
  </footer>

  <script>
    /* ====== Configuración de Proyectos (ya analizados) ====== */
    const projects = [
      {
        name: "Perfil de Dinámicas Laborales (PDL)",
        shortName: "PDL",
        tag: "Aplicación",
        url: "https://mbcx07.github.io/PDL/",
        subtitle: "Test PDL y resultados en nube",
        description:
          "Herramienta para aplicar el Perfil de Dinámicas Laborales al personal: captura datos del trabajador, aplica el test por bloques, calcula el perfil y permite administrar unidades, categorías y resultados, con exportación a CSV y soporte Firestore."
      },
      {
        name: "Reclutador de Médicos Especialistas (RME)",
        shortName: "RME",
        tag: "Aplicación",
        url: "https://mbcx07.github.io/RME/",
        subtitle: "Reclutamiento de Médicos Especialistas",
        description:
          "Sistema interno para localizar, seleccionar y dar seguimiento a Médicos Especialistas mediante búsquedas con Google Custom Search, selección de candidatos, exportación a CSV y generación de mensajes de invitación para contacto responsable."
      },
      {
        name: "Control de Ausencias por Pase (CAP)",
        shortName: "CAP",
        tag: "Aplicación",
        url: "https://mbcx07.github.io/CAP/",
        subtitle: "Pases, reportes y asiduidad",
        description:
          "Sistema CAP para que trabajadores, jefes de servicio y área de personal registren y revisen pases, generen folios y QR, consulten reportes por periodo, exporten a CSV y obtengan ranking de pasistas y puntos de asiduidad, con información en Firestore."
      },
      {
        name: "Gestión de Coberturas (CAM)",
        shortName: "CAM",
        tag: "Aplicación",
        url: "https://mbcx07.github.io/CAM/",
        subtitle: "Coberturas ante ausencias",
        description:
          "Herramienta de gestión de coberturas para registrar asistencia y ausencias, analizar impacto, proponer coberturas con suplentes o tiempo extra y administrar catálogos de servicios, personal y ausencias programadas. Funciona 100% local en el navegador (localStorage)."
      },
      {
        name: "Plazas para Médicos Especialistas – BCS (Draft 2026)",
        shortName: "Draft 2026",
        tag: "Página informativa",
        url: "https://mbcx07.github.io/draft2026/",
        subtitle: "Difusión de plazas y beneficios",
        description:
          "Página informativa sobre plazas para Médicos Especialistas del IMSS en Baja California Sur: resumen de la oportunidad, beneficios económicos, percepciones mensuales y anuales, calidad de vida en el estado, localidades con vacantes y datos de contacto de Recursos Humanos."
      }
    ];

    /* ====== Render ====== */
    const grid = document.getElementById("projectsGrid");
    const search = document.getElementById("searchInput");

    function render(filter = "") {
      grid.innerHTML = "";
      const f = filter.toLowerCase().trim();

      const filtered = projects.filter(p =>
        !f ||
        p.name.toLowerCase().includes(f) ||
        p.shortName.toLowerCase().includes(f) ||
        p.description.toLowerCase().includes(f) ||
        p.tag.toLowerCase().includes(f)
      );

      if (filtered.length === 0) {
        grid.innerHTML =
          `<p style="grid-column:1/-1; color:#4a5f54; font-size:0.9rem;">
            No se encontraron proyectos para el criterio de búsqueda.
          </p>`;
        return;
      }

      filtered.forEach(p => {
        const card = document.createElement("article");
        card.className = "project-card";

        card.innerHTML = `
          <div>
            <div class="project-tag">${p.tag}</div>
            <h2 class="project-title">${p.name}</h2>
            <div class="project-subtitle">${p.subtitle}</div>
            <p class="project-description">${p.description}</p>
          </div>
          <div class="project-footer">
            <span class="project-url">${p.url}</span>
            <button class="btn-link" data-url="${p.url}">
              Abrir <span class="btn-link-icon">↗</span>
            </button>
          </div>
        `;

        grid.appendChild(card);
      });

      document.querySelectorAll(".btn-link").forEach(btn => {
        btn.onclick = (e) => {
          const button = e.currentTarget;
          const url = button.getAttribute("data-url");
          if (url) window.open(url, "_blank", "noopener,noreferrer");
        };
      });
    }

    render();

    search.addEventListener("input", e => render(e.target.value));
  </script>
</body>
  </html>
