<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Proyectos | Departamento de Personal - IMSS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    /* ====== Estilos base ====== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: #f1f5f4;
      color: #0b2e13;
      line-height: 1.55;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ====== Colores Institucionales IMSS ====== */
    :root {
      --imss-green: #00573F;
      --imss-green-dark: #003f2d;
      --imss-green-light: #1b7a5c;
    }

    /* ====== Encabezado ====== */
    header {
      background: var(--imss-green);
      color: white;
      padding: 1.8rem 1rem;
      border-bottom: 6px solid var(--imss-green-light);
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }

    .header-inner {
      max-width: 1100px;
      margin: auto;
    }

    .title {
      font-size: clamp(1.8rem, 3vw, 2.3rem);
      font-weight: 700;
    }

    .subtitle {
      font-size: 1rem;
      opacity: 0.9;
      margin-top: .25rem;
    }

    /* ====== Contenido ====== */
    main {
      padding: 2rem 1rem;
    }

    .content {
      max-width: 1100px;
      margin: auto;
    }

    /* ====== Barra de búsqueda ====== */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.7rem;
      align-items: center;
    }

    .toolbar-label {
      font-weight: 600;
      color: #0b2e13;
      font-size: 0.95rem;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      border: 1px solid #bcd0c7;
      font-size: 0.95rem;
      outline: none;
      transition: all .2s ease;
      background: white;
    }

    .search-input:focus {
      border-color: var(--imss-green-light);
      box-shadow: 0 0 0 2px rgba(0, 87, 63, 0.25);
    }

    /* ====== Grid de proyectos ====== */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.3rem;
    }

    .project-card {
      background: white;
      border-radius: 10px;
      padding: 1.2rem;
      border: 1px solid #d7e4df;
      box-shadow: 0 3px 8px rgba(0,0,0,0.06);
      transition: all .18s ease-in-out;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 180px;
    }

    .project-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      border-color: #bcd0c7;
    }

    .project-tag {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 700;
      color: var(--imss-green);
    }

    .project-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin: .2rem 0;
      color: #0b2e13;
    }

    .project-description {
      font-size: 0.9rem;
      color: #2d4b3a;
      margin-bottom: .8rem;
    }

    /* ====== Footer dentro de tarjeta ====== */
    .project-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .project-url {
      font-size: 0.75rem;
      color: #50695d;
      word-break: break-all;
      flex: 1;
    }

    /* ====== Botón IMSS ====== */
    .btn-link {
      background: var(--imss-green);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 0.45rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s ease;
      white-space: nowrap;
      margin-left: .7rem;
    }

    .btn-link:hover {
      background: var(--imss-green-dark);
    }

    .btn-link-icon {
      font-size: 1rem;
    }

    /* ====== Pie de página ====== */
    footer {
      background: white;
      border-top: 4px solid var(--imss-green);
      padding: 1rem;
      margin-top: 2rem;
      font-size: .85rem;
      color: #2d4b3a;
    }

    .footer-inner {
      max-width: 1100px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <h1 class="title">Proyectos del Departamento de Personal</h1>
      <p class="subtitle">Instituto Mexicano del Seguro Social (IMSS)</p>
    </div>
  </header>

  <main>
    <div class="content">
      <!-- Barra con búsqueda -->
      <div class="toolbar">
        <span class="toolbar-label">Buscar proyecto:</span>
        <input id="searchInput" type="text" class="search-input"
          placeholder="Escribe el nombre o palabra clave..." />
      </div>

      <section class="projects-grid" id="projectsGrid"></section>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <span>Departamento de Personal – IMSS</span>
      <span>Acceso institucional a proyectos internos</span>
    </div>
  </footer>

  <script>
    /* ====== Configuración de Proyectos ====== */
    const projects = [
      {
        name: "PDL",
        tag: "Proyecto",
        url: "https://mbcx07.github.io/PDL/",
        description: "Sistema PDL — Gestión administrativa y operativa (ajusta la descripción según corresponda)."
      },
      {
        name: "RME",
        tag: "Proyecto",
        url: "https://mbcx07.github.io/RME/",
        description: "RME — Registro, monitoreo y evaluación del personal."
      },
      {
        name: "CAP",
        tag: "Proyecto",
        url: "https://mbcx07.github.io/CAP/",
        description: "CAP — Control y seguimiento de procesos administrativos."
      },
      {
        name: "CAM",
        tag: "Proyecto",
        url: "https://mbcx07.github.io/CAM/",
        description: "CAM — Administración y movimientos del personal."
      },
      {
        name: "Draft 2026",
        tag: "Borrador",
        url: "https://mbcx07.github.io/draft2026/",
        description: "Proyecto preliminar para desarrollo 2026."
      }
    ];

    /* ====== Render ====== */
    const grid = document.getElementById("projectsGrid");
    const search = document.getElementById("searchInput");

    function render(filter = "") {
      grid.innerHTML = "";
      const f = filter.toLowerCase();

      const filtered = projects.filter(p =>
        p.name.toLowerCase().includes(f) ||
        p.description.toLowerCase().includes(f)
      );

      if (filtered.length === 0) {
        grid.innerHTML = `<p style="grid-column:1/-1; color:#4a5f54;">No se encontraron proyectos.</p>`;
        return;
      }

      filtered.forEach(p => {
        const card = document.createElement("article");
        card.className = "project-card";

        card.innerHTML = `
          <div>
            <div class="project-tag">${p.tag}</div>
            <h2 class="project-title">${p.name}</h2>
            <p class="project-description">${p.description}</p>
          </div>
          <div class="project-footer">
            <span class="project-url">${p.url}</span>
            <button class="btn-link" data-url="${p.url}">
              Abrir <span class="btn-link-icon">↗</span>
            </button>
          </div>
        `;

        grid.appendChild(card);
      });

      document.querySelectorAll(".btn-link").forEach(btn => {
        btn.onclick = e => window.open(e.target.closest("button").dataset.url, "_blank");
      });
    }

    render();

    search.addEventListener("input", e => render(e.target.value));
  </script>

</body>
</html>
