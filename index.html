<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Proyectos - Departamento de Personal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* ====== Estilos base ====== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: #f3f4f6;
      color: #111827;
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ====== Contenedor principal ====== */
    .page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #1d4ed8, #1e40af);
      color: white;
      padding: 1.5rem 1rem;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.3);
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
    }

    .title {
      font-size: clamp(1.6rem, 3vw, 2.1rem);
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.95rem;
      opacity: 0.9;
    }

    main {
      flex: 1;
      padding: 1.5rem 1rem 2.5rem;
    }

    .content {
      max-width: 960px;
      margin: 0 auto;
    }

    /* ====== Filtros / búsqueda (opcional visual) ====== */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .toolbar-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #4b5563;
    }

    .search-input {
      flex: 1;
      min-width: 180px;
      padding: 0.55rem 0.75rem;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      font-size: 0.9rem;
      outline: none;
      background: white;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .search-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.25);
    }

    /* ====== Grid de proyectos ====== */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(1, minmax(0, 1fr));
      gap: 1rem;
    }

    @media (min-width: 640px) {
      .projects-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 1024px) {
      .projects-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    .project-card {
      background: white;
      border-radius: 0.9rem;
      padding: 1rem;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 8px rgba(15, 23, 42, 0.03);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: transform 0.12s ease, box-shadow 0.12s ease,
        border-color 0.12s ease;
    }

    .project-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.08);
      border-color: #d1d5db;
    }

    .project-tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      color: #1d4ed8;
    }

    .project-title {
      font-size: 1rem;
      font-weight: 700;
      color: #111827;
    }

    .project-description {
      font-size: 0.88rem;
      color: #4b5563;
      flex: 1;
    }

    .project-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }

    .project-url {
      font-size: 0.75rem;
      color: #6b7280;
      word-break: break-all;
    }

    .btn-link {
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 0.45rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: background 0.12s ease, transform 0.08s ease,
        box-shadow 0.12s ease;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.35);
      white-space: nowrap;
    }

    .btn-link:hover {
      background: #1e40af;
      transform: translateY(-1px);
      box-shadow: 0 7px 16px rgba(30, 64, 175, 0.45);
    }

    .btn-link:active {
      transform: translateY(0);
      box-shadow: 0 3px 8px rgba(30, 64, 175, 0.4);
    }

    .btn-link-icon {
      font-size: 1rem;
      line-height: 1;
    }

    footer {
      border-top: 1px solid #e5e7eb;
      padding: 0.9rem 1rem;
      font-size: 0.8rem;
      color: #6b7280;
      background: white;
    }

    .footer-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <!-- ====== Encabezado ====== -->
    <header>
      <div class="header-inner">
        <h1 class="title">Proyectos del Departamento de Personal</h1>
        <p class="subtitle">
          Listado centralizado de aplicaciones y herramientas desarrolladas por el
          Departamento de Personal.
        </p>
      </div>
    </header>

    <!-- ====== Contenido principal ====== -->
    <main>
      <div class="content">
        <!-- Barra con búsqueda -->
        <div class="toolbar">
          <span class="toolbar-label">Buscar proyecto:</span>
          <input
            id="searchInput"
            type="text"
            class="search-input"
            placeholder="Escribe el nombre o una palabra clave..."
          />
        </div>

        <!-- Grid de proyectos -->
        <section class="projects-grid" id="projectsGrid">
          <!-- Los proyectos se llenan dinámicamente con JavaScript -->
        </section>
      </div>
    </main>

    <!-- ====== Pie de página ====== -->
    <footer>
      <div class="footer-inner">
        <span>Departamento de Personal</span>
        <span>Página de acceso a proyectos internos</span>
      </div>
    </footer>
  </div>

  <script>
    // ====== Configuración de proyectos ======
    // Aquí puedes ajustar nombres y descripciones de cada proyecto.
    const projects = [
      {
        id: "pdl",
        tag: "Proyecto",
        name: "PDL",
        url: "https://mbcx07.github.io/PDL/",
        description:
          "Sistema relacionado con PDL (ajusta esta descripción para detallar el objetivo del proyecto, por ejemplo: gestión de planes de desarrollo laboral).",
      },
      {
        id: "rme",
        tag: "Proyecto",
        name: "RME",
        url: "https://mbcx07.github.io/RME/",
        description:
          "Aplicación RME (modifica este texto para describir la función principal, por ejemplo: registro y monitoreo de evaluaciones).",
      },
      {
        id: "cap",
        tag: "Proyecto",
        name: "CAP",
        url: "https://mbcx07.github.io/CAP/",
        description:
          "Herramienta CAP (edita la descripción según el alcance real, por ejemplo: control y seguimiento de capacitaciones).",
      },
      {
        id: "cam",
        tag: "Proyecto",
        name: "CAM",
        url: "https://mbcx07.github.io/CAM/",
        description:
          "Módulo CAM (personaliza este texto para explicar el propósito, por ejemplo: administración de cambios o movimientos de personal).",
      },
      {
        id: "draft2026",
        tag: "Borrador",
        name: "Draft 2026",
        url: "https://mbcx07.github.io/draft2026/",
        description:
          "Versión preliminar para 2026 (borrador o prototipo de proyecto; especifica aquí qué se está probando o diseñando).",
      },
    ];

    // ====== Renderizado de tarjetas ======
    const grid = document.getElementById("projectsGrid");
    const searchInput = document.getElementById("searchInput");

    function renderProjects(filterText = "") {
      const text = filterText.toLowerCase().trim();
      grid.innerHTML = "";

      const filtered = projects.filter((p) => {
        if (!text) return true;
        return (
          p.name.toLowerCase().includes(text) ||
          p.description.toLowerCase().includes(text) ||
          p.tag.toLowerCase().includes(text)
        );
      });

      if (filtered.length === 0) {
        grid.innerHTML =
          '<p style="grid-column: 1/-1; font-size:0.9rem; color:#6b7280;">No se encontraron proyectos para el criterio de búsqueda.</p>';
        return;
      }

      filtered.forEach((project) => {
        const card = document.createElement("article");
        card.className = "project-card";

        card.innerHTML = `
          <div class="project-tag">${project.tag}</div>
          <h2 class="project-title">${project.name}</h2>
          <p class="project-description">${project.description}</p>
          <div class="project-footer">
            <span class="project-url">${project.url}</span>
            <button class="btn-link" data-url="${project.url}">
              Abrir
              <span class="btn-link-icon">↗</span>
            </button>
          </div>
        `;

        grid.appendChild(card);
      });

      // Agregamos eventos a los botones después de renderizar
      document.querySelectorAll(".btn-link").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          const url = e.currentTarget.getAttribute("data-url");
          if (url) {
            window.open(url, "_blank", "noopener,noreferrer");
          }
        });
      });
    }

    // Render inicial
    renderProjects();

    // Búsqueda en vivo
    searchInput.addEventListener("input", (e) => {
      renderProjects(e.target.value);
    });
  </script>
</body>
</html>
